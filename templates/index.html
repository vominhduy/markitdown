<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MarkItDown</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:#111827;
    color:#f3f4f6;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 24px;
}

.card{

    background:#1f2937;
    border-radius:16px;
    padding:24px;

    box-shadow:
    0 8px 30px rgba(0,0,0,.35);
}

h1{

    margin-top:0;
    margin-bottom:6px;
}

.subtitle{

    color:#9ca3af;
    margin-bottom:30px;
}

.upload{

    border:2px dashed #4b5563;

    border-radius:16px;

    padding:40px;

    text-align:center;

    transition:.25s;

}

.upload:hover{

    border-color:#3b82f6;

    background:#1b2538;

}

.upload-icon{

    font-size:52px;

    margin-bottom:10px;

}

.browse-btn{

    display:inline-block;

    margin-top:15px;

    padding:12px 24px;

    border-radius:10px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    transition:.2s;

    font-weight:600;

}

.browse-btn:hover{

    background:#1d4ed8;

}

.selected-file{

    margin-top:20px;

    color:#9ca3af;

    font-size:14px;

    word-break:break-all;

}

input[type=file]{

    margin-top:15px;
}

.buttons{

    display:flex;

    gap:12px;

    margin-top:20px;
}

button{

    border:none;

    border-radius:10px;

    padding:12px 18px;

    font-size:15px;

    cursor:pointer;

    transition:.2s;
}

.primary{

    background:#2563eb;
    color:white;
}

.primary:hover{

    background:#1d4ed8;
}

.secondary{

    background:#374151;
    color:white;
}

.secondary:hover{

    background:#4b5563;
}

.info{

    margin-top:18px;

    color:#9ca3af;

    font-size:14px;
}

textarea{

    width:100%;

    height:300px;

    margin-top:20px;

    background:#0f172a;

    color:#e5e7eb;

    border:none;

    border-radius:12px;

    padding:20px;

    resize:vertical;

    font-size:14px;

    font-family:
    "JetBrains Mono",
    Consolas,
    monospace;

    line-height:1.6;
}

.footer{

    margin-top:20px;

    color:#6b7280;

    text-align:center;

    font-size:13px;
}

button:disabled{

    background:#374151 !important;

    color:#9ca3af;

    cursor:not-allowed;

    opacity:.6;

}

.hidden{

    display:none;

}

#savedBox{

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#1f2937;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>📄 Microsoft MarkItDown</h1>

<div class="subtitle">
Convert PDF, DOCX, PPTX, XLSX... thành Markdown
</div>

<form method="post" id="uploadForm">

<div class="upload">

    <div class="upload-icon">
        📄
    </div>

    <label for="fileInput" class="browse-btn">
        Browse Files
    </label>

    <input
        type="file"
        id="fileInput"
        name="file"
        required
        hidden>

    <div id="selectedFile" class="selected-file">

        Chưa chọn file

    </div>

</div>

<div class="buttons">

<button class="primary" type="submit" id="convertBtn" disabled>
Convert
</button>

<button
type="button"
class="secondary"
onclick="copyMarkdown()" id="copyBtn" disabled>

Copy

</button>

<button
type="button"
class="secondary"
onclick="downloadMarkdown()" id="downloadBtn" disabled>

Download

</button>

</div>

</form>

<div class="info">
<span id="stats"></span>
</div>

<textarea id="markdownText" readonly>{{ markdown }}</textarea>

<div
id="savedBox"
class="hidden">

    <p>

        ✅ Saved successfully

    </p>

    <button
        onclick="openFile()">

        📄 Open File

    </button>

    <button
        onclick="openFolder()">

        📂 Open Folder

    </button>

</div>

<div class="footer">

Built with ❤️ FastAPI + Microsoft MarkItDown

</div>

</div>

</div>

<script src="{{ url_for('static', path='app.js') }}"></script>


</body>
</html>
